name: 🤖 Bob Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Bob reviews this PR
    # Skip draft PRs and bot-authored PRs to avoid loops
    if: >
      github.event.pull_request.draft == false &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1  # gh pr diff hits the API, not local history — shallow is enough

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Bob Shell
        id: cache-bob
        uses: actions/cache@v4
        with:
          path: ~/.bob
          key: bobshell-${{ runner.os }}-${{ hashFiles('.github/workflows/bob-review.yml') }}

      - name: Install Bob Shell
        if: steps.cache-bob.outputs.cache-hit != 'true'
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Run Bob Shell review
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          bob --accept-license --auth-method api-key -p "$(cat <<'EOF'
          Review this PR on IBM/galaxium-travels, non-interactively, in CI. Work efficiently —
          only investigate as much as each step below asks for.

          Galaxium Travels is a demo app for showcasing IBM Bob. First classify the PR:
          - **Feature/infra**: a real change to the app. Review normally.
          - **Demo scenario**: sets up a Bob demo. Convoluted-looking code is expected, not a
            finding — just describe what it demonstrates and flag only if clearly broken.
          - **Learning assignment**: a trivial change from a Bob learning exercise. Say so up top
            and keep it brief, no nitpicking.

          Steps:
          1. Skim AGENTS.md (only sections relevant to touched paths) and pr.diff (file_path="pr.diff")
             to pick a category.
          2. Investigate at matching depth:
             - Learning assignment: none needed beyond the diff.
             - Demo scenario: read touched files, skip cross-repo verification unless obviously broken.
             - Feature/infra: for small diffs (≤3 files, ≤50 lines), read changed hunks + ~15 lines
               context, only pulling full files if needed to resolve a symbol. For larger diffs, read
               full files. Grep changed symbols, stop after 2 call sites unless one looks broken, and
               only chase cross-service (frontend/backend/Java) if a public API/schema/shared type changed.
          3. Write the review to stdout between these markers exactly:

          <<<BOB_REVIEW_BEGIN>>>
          ...review markdown...
          <<<BOB_REVIEW_END>>>

          Review contents: 1-2 sentence summary, then **PR category: ...** with a one-line reason.
          Feature/infra PRs get a "Findings" section (blocker/nit/question), each with exact
          file:line, the concrete issue, and a short fix. No issues found → say so, don't invent any.
          Don't restate the diff, don't hedge uncertain findings (just leave them out), don't
          approve/block — you're commenting only. Don't modify files, run tests, or write files.
          EOF
          )" 2>&1 | tee bob_output.txt

      - name: Extract review from Bob's stdout
        run: |
          python3 -c "
          import re, sys
          text = open('bob_output.txt').read()
          m = re.search(r'<<<BOB_REVIEW_BEGIN>>>(.*?)<<<BOB_REVIEW_END>>>', text, re.DOTALL)
          if m:
              print(m.group(1).strip())
          else:
              print('_Bob did not produce a structured review. Raw output below._\n')
              print(text)
          " > review_body.md
          {
            echo "## 🤖 Bob's Review"
            echo ""
            echo "*Posted by [Bob Shell](https://bob.ibm.com), IBM's CLI agent — running headless on GitHub Actions.*"
            echo ""
            echo "---"
            echo ""
            cat review_body.md
          } > review.md
          echo "--- Final review ---"
          cat review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review ${{ github.event.pull_request.number }} --comment --body-file review.md
